<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 280" preserveAspectRatio="xMidYEnd meet">
  <!-- Dallas skyline silhouette, abstract. Buildings drawn from left to right roughly matching the actual skyline order: Reunion Tower → cluster → Bank of America Plaza → Renaissance Tower (double-X top) → other towers → Heritage Plaza area -->
  <g fill="currentColor">
    <!-- Outer/left small buildings -->
    <rect x="20" y="220" width="40" height="60"/>
    <rect x="62" y="200" width="30" height="80"/>

    <!-- Reunion Tower -->
    <rect x="120" y="170" width="6" height="110"/>
    <circle cx="123" cy="160" r="22"/>
    <rect x="120" y="138" width="6" height="10"/>
    <rect x="121.5" y="125" width="3" height="14"/>

    <!-- Hyatt-area block -->
    <rect x="180" y="195" width="58" height="85"/>
    <rect x="240" y="170" width="48" height="110"/>
    <rect x="290" y="150" width="22" height="130"/>

    <!-- Mid-cluster -->
    <rect x="330" y="180" width="45" height="100"/>
    <rect x="377" y="155" width="38" height="125"/>
    <rect x="417" y="190" width="30" height="90"/>

    <!-- Bank of America Plaza area (tallest) -->
    <rect x="470" y="110" width="56" height="170"/>
    <rect x="528" y="125" width="14" height="155"/>

    <!-- Smaller stepped neighbors -->
    <rect x="555" y="170" width="40" height="110"/>
    <rect x="600" y="195" width="35" height="85"/>

    <!-- Renaissance Tower (twin slabs with crossbar at top) -->
    <rect x="660" y="120" width="22" height="160"/>
    <rect x="690" y="120" width="22" height="160"/>
    <rect x="660" y="120" width="52" height="6"/>
    <rect x="668" y="108" width="36" height="6"/>

    <!-- Comerica / Trammell Crow Center area -->
    <rect x="735" y="145" width="44" height="135"/>
    <rect x="780" y="170" width="20" height="110"/>
    <rect x="800" y="160" width="35" height="120"/>

    <!-- KPMG / Heritage Plaza -->
    <rect x="850" y="135" width="50" height="145"/>
    <polygon points="850,135 875,118 900,135"/>

    <!-- Fountain Place area -->
    <rect x="910" y="160" width="48" height="120"/>
    <polygon points="910,160 934,140 958,160"/>

    <!-- Mid right cluster -->
    <rect x="975" y="180" width="32" height="100"/>
    <rect x="1010" y="200" width="28" height="80"/>
    <rect x="1045" y="170" width="42" height="110"/>

    <!-- Energy Plaza style stepped -->
    <rect x="1100" y="155" width="48" height="125"/>
    <rect x="1115" y="140" width="20" height="20"/>

    <!-- Magnolia building / older -->
    <rect x="1165" y="190" width="40" height="90"/>
    <rect x="1180" y="180" width="10" height="12"/>

    <!-- Adolphus / mixed -->
    <rect x="1215" y="175" width="55" height="105"/>
    <rect x="1273" y="195" width="40" height="85"/>

    <!-- Right-side mid-rises -->
    <rect x="1320" y="210" width="35" height="70"/>
    <rect x="1358" y="195" width="42" height="85"/>
    <rect x="1402" y="220" width="30" height="60"/>
    <rect x="1435" y="205" width="38" height="75"/>
    <rect x="1476" y="225" width="44" height="55"/>
    <rect x="1525" y="215" width="32" height="65"/>
    <rect x="1560" y="240" width="40" height="40"/>
  </g>
</svg>
